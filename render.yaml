services:
  - type: web
    name: scoutai
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: GROQ_API_KEY
        sync: false # You will input this manually in the Render dashboard
    autoDeploy: false
